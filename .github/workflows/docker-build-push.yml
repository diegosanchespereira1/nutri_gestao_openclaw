name: Docker Build & Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-build-push-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker-latest:
    name: Build and push (latest + SHA — PRD)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate Docker Hub credentials
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME || secrets.DOCKER_HUB_USERNAME || vars.DOCKER_HUB_USERNAME || secrets.DOCKER_USERNAME || vars.DOCKER_USERNAME }}
          DOCKERHUB_PASS: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_HUB_TOKEN || secrets.DOCKER_HUB_PASSWORD || secrets.DOCKERHUB_PASSWORD }}
        run: |
          if [ -z "$DOCKERHUB_USER" ]; then
            echo "::error::Usuário Docker Hub vazio. Confira: (1) Secret na aba **Actions** (não só Dependabot/Codespaces). (2) Ou crie a Repository **Variable** DOCKERHUB_USERNAME. (3) Se estiver em **Environment** secrets, adicione ao job 'environment: NOME_DO_ENV' ou duplique em Repository secrets."
            exit 1
          fi
          if [ -z "$DOCKERHUB_PASS" ]; then
            echo "::error::Token Docker Hub vazio. Crie o secret **DOCKERHUB_TOKEN** em Settings → Secrets and variables → **Actions** (ou duplique o Environment secret no repositório)."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME || secrets.DOCKER_HUB_USERNAME || vars.DOCKER_HUB_USERNAME || secrets.DOCKER_USERNAME || vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_HUB_TOKEN || secrets.DOCKER_HUB_PASSWORD || secrets.DOCKERHUB_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: stratostech/nutricao-stratostech
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Read app version
        id: appver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}
            NEXT_PUBLIC_APP_VERSION=${{ steps.appver.outputs.version }}
          cache-from: type=gha,scope=docker-latest
          cache-to: type=gha,mode=max,scope=docker-latest

  docker-dev:
    name: Build and push (dev — Supabase DEV)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate Docker Hub credentials
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME || secrets.DOCKER_HUB_USERNAME || vars.DOCKER_HUB_USERNAME || secrets.DOCKER_USERNAME || vars.DOCKER_USERNAME }}
          DOCKERHUB_PASS: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_HUB_TOKEN || secrets.DOCKER_HUB_PASSWORD || secrets.DOCKERHUB_PASSWORD }}
        run: |
          if [ -z "$DOCKERHUB_USER" ]; then
            echo "::error::Usuário Docker Hub vazio. Confira: (1) Secret na aba **Actions** (não só Dependabot/Codespaces). (2) Ou crie a Repository **Variable** DOCKERHUB_USERNAME. (3) Se estiver em **Environment** secrets, adicione ao job 'environment: NOME_DO_ENV' ou duplique em Repository secrets."
            exit 1
          fi
          if [ -z "$DOCKERHUB_PASS" ]; then
            echo "::error::Token Docker Hub vazio. Crie o secret **DOCKERHUB_TOKEN** em Settings → Secrets and variables → **Actions** (ou duplique o Environment secret no repositório)."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME || secrets.DOCKER_HUB_USERNAME || vars.DOCKER_HUB_USERNAME || secrets.DOCKER_USERNAME || vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_HUB_TOKEN || secrets.DOCKER_HUB_PASSWORD || secrets.DOCKERHUB_PASSWORD }}

      - name: Read app version
        id: appver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build and push dev
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: stratostech/nutricao-stratostech:dev
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL_DEV }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_DEV }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL_DEV }}
            NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY_DEV }}
            NEXT_PUBLIC_APP_VERSION=${{ steps.appver.outputs.version }}
          cache-from: type=gha,scope=docker-dev
          cache-to: type=gha,mode=max,scope=docker-dev

  # ──────────────────────────────────────────────────────────────────────────
  # E2E funcional — checklist do cliente Hospital TESTE:
  # preencher itens como Conforme → finalizar → assinar → aprovar → gerar PDF.
  # Requer secrets E2E_EMAIL, E2E_PASSWORD e E2E_SUPABASE_URL (ou equivalente).
  # Sem credenciais E2E o spec é ignorado automaticamente (test.skip).
  # ──────────────────────────────────────────────────────────────────────────
  e2e-checklist-hospital:
    name: E2E — checklist Hospital TESTE
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL || 'https://example.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.e30.test' }}
      NEXT_PUBLIC_APP_VERSION: "0.0.0-ci"
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run checklist Hospital TESTE (E2E)
        run: npm run test:e2e -- e2e/auth-checklist-hospital-teste.spec.ts

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-checklist-hospital
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Build de verificação Android (APK debug, sem assinatura).
  # Garante que o projeto nativo compila. O app é uma casca Capacitor que
  # aponta para a URL de produção, então não depende do build do Next.js.
  # Para gerar o AAB assinado de release, configure a keystore e secrets.
  # ──────────────────────────────────────────────────────────────────────────
  android-build:
    name: Build mobile (Android — APK debug, unsigned)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Capacitor sync (Android)
        run: npx cap sync android

      - name: Build APK (debug)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nutrigestao-android-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # Build de verificação iOS (compilação para simulador, sem assinatura).
  # Requer runner macOS. Não gera IPA distribuível — apenas valida o build.
  # Para gerar IPA de release, configure certificado/provisioning + secrets.
  # ──────────────────────────────────────────────────────────────────────────
  ios-build:
    name: Build mobile (iOS — simulador, unsigned)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capacitor sync (iOS)
        run: npx cap sync ios

      - name: Build (iOS Simulator, sem assinatura)
        working-directory: ios/App
        run: |
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcbeautify
        # xcbeautify já vem instalado nos runners macOS do GitHub.
