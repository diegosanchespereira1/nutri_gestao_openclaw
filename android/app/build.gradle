apply plugin: 'com.android.application'

def loadReleaseKeystoreCredentials = {
    def keystorePropsFile = rootProject.file("keystore.properties")
    def keystoreFile
    def storePassword
    def keyAlias
    def keyPassword

    if (keystorePropsFile.exists()) {
        def props = new Properties()
        props.load(new FileInputStream(keystorePropsFile))
        def storePath = props['storeFile']?.toString()?.trim()
        if (!storePath) {
            return null
        }
        keystoreFile = storePath.startsWith("/")
            ? file(storePath)
            : rootProject.file(storePath)
        storePassword = props['storePassword']
        keyAlias = props['keyAlias']
        keyPassword = props['keyPassword']
    } else {
        def storePath = System.getenv("KEYSTORE_PATH") ?: "app/nutrigestao-release.keystore"
        keystoreFile = file(storePath).isAbsolute()
            ? file(storePath)
            : rootProject.file(storePath)
        storePassword = System.getenv("KEYSTORE_PASSWORD") ?: ""
        keyAlias = System.getenv("KEY_ALIAS") ?: "nutrigestao"
        keyPassword = System.getenv("KEY_PASSWORD") ?: ""
    }

    if (!keystoreFile.exists()) {
        return null
    }

    return [
        file: keystoreFile,
        storePassword: storePassword,
        keyAlias: keyAlias,
        keyPassword: keyPassword,
    ]
}

def isReleaseBuildTask = {
    gradle.startParameter.taskNames.any { name ->
        def lower = name.toLowerCase()
        lower.contains("release") &&
            (lower.contains("bundle") || lower.contains("assemble") || lower.contains("package"))
    }
}

android {
    namespace = "br.com.nutrigestao.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "br.com.nutrigestao.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 145
        versionName "1.2.24"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            def creds = loadReleaseKeystoreCredentials()
            if (creds != null) {
                storeFile creds.file
                storePassword creds.storePassword
                keyAlias creds.keyAlias
                keyPassword creds.keyPassword
            }
        }
    }

    buildTypes {
        debug {
            // webContentsDebuggingEnabled habilitado via MainActivity ou capacitor.config.ts
        }
        release {
            def creds = loadReleaseKeystoreCredentials()
            if (creds != null) {
                signingConfig signingConfigs.release
            }
            // Capacitor/WebView: ofuscação R8 desligada — evita quebra de plugins nativos.
            // O aviso da Play Store sobre mapping file é esperado enquanto minifyEnabled=false.
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            ndk {
                // Símbolos nativos (.so) para crash/ANR no Play Console (Capacitor, câmera, etc.)
                debugSymbolLevel 'SYMBOL_TABLE'
            }
        }
    }

    // Android 16 impõe kernel com páginas de 16KB por padrão.
    // Bibliotecas nativas (.so) do Capacitor precisam ser empacotadas
    // sem compressão para que o sistema consiga carregá-las nesse modo.
    // Sem isso o app crasha silenciosamente na abertura em dispositivos Android 16.
    packaging {
        jniLibs {
            useLegacyPackaging = false
        }
    }
}

gradle.taskGraph.whenReady { graph ->
    if (!isReleaseBuildTask()) {
        return
    }
    def creds = loadReleaseKeystoreCredentials()
    if (creds == null) {
        throw new GradleException(
            "Keystore de release não encontrado.\n" +
            "Configure android/keystore.properties (veja keystore.properties.example) " +
            "ou defina KEYSTORE_PATH antes de bundleRelease."
        )
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.webkit:webkit:$androidxWebkitVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied.")
}
