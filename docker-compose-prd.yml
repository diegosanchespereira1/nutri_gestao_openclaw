# NutriGestão — produção (Docker Swarm + Traefik)
#
# Servidor PRD: mesma stack que docker-compose.portainer.yml, com rede Traefik
# alinhada ao cluster (StratosNetwork), como nas stacks que já funcionam aí.
#
# Rede externa (criar antes se ainda não existir):
#   docker network create StratosNetwork
#
# Ver também as notas em docker-compose.portainer.yml (healthcheck, volumes,
# NEXT_SERVER_ACTIONS_ENCRYPTION_KEY, variáveis TRAEFIK_*, APP_HOST, etc.).

version: "3.7"

services:
  nutricao_app:
    image: ${NUTRICAO_IMAGE:-stratostech/nutricao-stratostech:latest}
    environment:
      NODE_ENV: production
      SUPABASE_URL: ${SUPABASE_URL:-${NEXT_PUBLIC_SUPABASE_URL:-}}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://nutricao.stratostech.com.br}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      DOSSIER_EMAIL_FROM: ${DOSSIER_EMAIL_FROM:-}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(\"http://127.0.0.1:3000/login\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 90s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      update_config:
        parallelism: 1
        order: start-first
        delay: 10s
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-nutricao-app}.rule=Host(`${APP_HOST:-nutricao.stratostech.com.br}`)"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-nutricao-app}.entrypoints=websecure"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-nutricao-app}.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-nutricao-app}.priority=1"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-nutricao-app}.service=${TRAEFIK_SERVICE_NAME:-nutricao-app}"
      - "traefik.http.middlewares.${TRAEFIK_MIDDLEWARE_NAME:-nutricao-sslheader}.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-nutricao-app}.middlewares=${TRAEFIK_MIDDLEWARE_NAME:-nutricao-sslheader}"
      - "traefik.http.services.${TRAEFIK_SERVICE_NAME:-nutricao-app}.loadbalancer.server.port=3000"
      - "traefik.http.services.${TRAEFIK_SERVICE_NAME:-nutricao-app}.loadbalancer.passHostHeader=true"
      - traefik.docker.network=StratosNetwork
    networks:
      - StratosNetwork

networks:
  StratosNetwork:
    external: true
    name: StratosNetwork
