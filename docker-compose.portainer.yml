# Stack para Portainer + Traefik (rede e certresolver alinhados ao Chatwoot na VPS).
#
# Antes do deploy:
# 1) Build & push da imagem (com NEXT_PUBLIC_* no build), ex.:
#    docker build \
#      --build-arg NEXT_PUBLIC_SUPABASE_URL=https://xxx.supabase.co \
#      --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJ... \
#      --build-arg NEXT_PUBLIC_SITE_URL=https://nutricao.stratostech.com.br \
#      -t seu-registry/nutricao-stratostech:tag .
#    docker push seu-registry/nutricao-stratostech:tag
# 2) No Portainer: definir NUTRICAO_IMAGE e (opcional) NUTRICAO_HOST; rede HMLStratosNetwork deve existir.
#
# Segredos server-only (Resend, etc.): adicionar em environment abaixo ou via Portainer secrets.
#
# Volume nomeado: persiste cache em disco do Next (.next/cache) entre recriações do container
# (ISR, fetch cache, etc.). Gerido pela stack no Portainer.



services:
  nutricao_app:
    image: ${NUTRICAO_IMAGE:-stratostech/nutricao-stratostech:latest}
    container_name: nutricao_stratostech
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Opcional no runtime (já embutido no build se usaste NEXT_PUBLIC_* no docker build):
      # NEXT_PUBLIC_SUPABASE_URL=
      # NEXT_PUBLIC_SUPABASE_ANON_KEY=
      # NEXT_PUBLIC_SITE_URL=
      # RESEND_API_KEY=
      # DOSSIER_EMAIL_FROM=
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    volumes:
      - nutricao_next_cache:/app/.next/cache
    labels:
      - traefik.enable=true
      - "traefik.http.routers.nutricao_app.rule=Host(`nutricao.stratostech.com.br`)"
      - traefik.http.routers.nutricao_app.entrypoints=websecure
      - traefik.http.routers.nutricao_app.tls.certresolver=letsencryptresolver
      - traefik.http.routers.nutricao_app.priority=1
      - traefik.http.routers.nutricao_app.service=nutricao_app
      - traefik.http.middlewares.nutricao_sslheader.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.routers.nutricao_app.middlewares=nutricao_sslheader
      - traefik.http.services.nutricao_app.loadbalancer.server.port=3000
      - traefik.http.services.nutricao_app.loadbalancer.passHostHeader=true
      - traefik.docker.network=HMLStratosNetwork
    networks:
      - HMLStratosNetwork

volumes:
  nutricao_next_cache:
    driver: local

networks:
  HMLStratosNetwork:
    external: true
    name: HMLStratosNetwork
