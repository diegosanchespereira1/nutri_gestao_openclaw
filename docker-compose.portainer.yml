# Stack Portainer + Traefik — NutriGestão (StratosTech)
#
# ANTES DO DEPLOY
# 1) Build e push (NEXT_PUBLIC_* no build da imagem):
#    docker buildx build --platform linux/amd64 --push \
#      --build-arg NEXT_PUBLIC_SUPABASE_URL=https://xxx.supabase.co \
#      --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJ... \
#      --build-arg NEXT_PUBLIC_SITE_URL=https://nutricao.stratostech.com.br \
#      -t stratostech/nutricao-stratostech:latest .
#
# 2) No Portainer → Stack → Environment, definir no mínimo:
#    NUTRICAO_IMAGE=stratostech/nutricao-stratostech:latest
#    SUPABASE_SERVICE_ROLE_KEY=<Project Settings → API → service_role>
#    (Opcional) repetir NEXT_PUBLIC_* aqui se quiseres mudar projeto sem rebuild.
#
# 3) Após alterar env: Recreate do serviço (não só Save).
#
# Segredos server-only nunca vão para ARG do build nem para NEXT_PUBLIC_*.

services:
  nutricao_app:
    image: ${NUTRICAO_IMAGE:-stratostech/nutricao-stratostech:latest}
    platform: ${NUTRICAO_PLATFORM:-linux/amd64}
    container_name: nutricao_stratostech
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Runtime: permitem trocar projeto / diagnóstico sem rebuild (valores vazios = usa o que está na imagem).
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      DOSSIER_EMAIL_FROM: ${DOSSIER_EMAIL_FROM:-}
    # / redireciona (307); healthcheck deve usar rota que devolve 200 (página estática).
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - nutricao_next_cache:/app/.next/cache
    labels:
      - traefik.enable=true
      - "traefik.http.routers.nutricao_app.rule=Host(`nutricao.stratostech.com.br`)"
      - traefik.http.routers.nutricao_app.entrypoints=websecure
      - traefik.http.routers.nutricao_app.tls.certresolver=letsencryptresolver
      - traefik.http.routers.nutricao_app.priority=1
      - traefik.http.routers.nutricao_app.service=nutricao_app
      - traefik.http.middlewares.nutricao_sslheader.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.routers.nutricao_app.middlewares=nutricao_sslheader
      - traefik.http.services.nutricao_app.loadbalancer.server.port=3000
      - traefik.http.services.nutricao_app.loadbalancer.passHostHeader=true
      - traefik.docker.network=HMLStratosNetwork
    networks:
      - HMLStratosNetwork

volumes:
  nutricao_next_cache:
    driver: local

networks:
  HMLStratosNetwork:
    external: true
    name: HMLStratosNetwork
