# NutriGestão — Portainer + Traefik
#
# NOTAS IMPORTANTES
# ─────────────────
# 1) Rede externa: cria antes (ou o deploy falha):
#    docker network create HMLStratosNetwork
#
# 2) Não uses volume em /app/.next/cache com USER nextjs na imagem: o volume fica
#    root-owned e o Next não consegue escrever → erro 500 em runtime.
#
# 3) Em Docker Swarm (stack), não uses `container_name` (não suportado).
#
# 4) Build da imagem com NEXT_PUBLIC_* em --build-arg; no Portainer define também
#    SUPABASE_SERVICE_ROLE_KEY na stack e Recreate após alterar.

services:
  nutricao_app:
    image: ${NUTRICAO_IMAGE:-stratostech/nutricao-stratostech:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      DOSSIER_EMAIL_FROM: ${DOSSIER_EMAIL_FROM:-}
    # Rota estática com 200 (evita 307 de /)
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(\"http://127.0.0.1:3000/login\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    labels:
      - traefik.enable=true
      - "traefik.http.routers.nutricao_app.rule=Host(`nutricao.stratostech.com.br`)"
      - traefik.http.routers.nutricao_app.entrypoints=websecure
      - traefik.http.routers.nutricao_app.tls.certresolver=letsencryptresolver
      - traefik.http.routers.nutricao_app.priority=1
      - traefik.http.routers.nutricao_app.service=nutricao_app
      - traefik.http.middlewares.nutricao_sslheader.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.routers.nutricao_app.middlewares=nutricao_sslheader
      - traefik.http.services.nutricao_app.loadbalancer.server.port=3000
      - traefik.http.services.nutricao_app.loadbalancer.passHostHeader=true
      - traefik.docker.network=HMLStratosNetwork
    networks:
      - HMLStratosNetwork

networks:
  HMLStratosNetwork:
    external: true
    name: HMLStratosNetwork
