# Stack para Portainer + Traefik (rede e certresolver alinhados ao Chatwoot na VPS).
#
# Antes do deploy:
# 1) Build & push da imagem Linux/amd64 (com NEXT_PUBLIC_* no build), ex.:
#    docker buildx build \
#      --platform linux/amd64 \
#      --push \
#      --build-arg NEXT_PUBLIC_SUPABASE_URL=https://xxx.supabase.co \
#      --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJ... \
#      --build-arg NEXT_PUBLIC_SITE_URL=https://nutricao.stratostech.com.br \
#      -t seu-registry/nutricao-stratostech:tag .
#    # (Opcional) Validar arquitetura publicada:
#    docker buildx imagetools inspect seu-registry/nutricao-stratostech:tag
# 2) No Portainer: definir NUTRICAO_IMAGE e (opcional) NUTRICAO_HOST; rede HMLStratosNetwork deve existir.
#
# Segredos server-only: definir no Portainer (Environment ou Secrets), nunca no build nem em NEXT_PUBLIC_*.
#
# SUPABASE_SERVICE_ROLE_KEY — obrigatória em runtime para criar membro da equipe (auth.admin.createUser).
#   Supabase Dashboard → Project Settings → API → service_role (secret). Nome exato da variável.
#   No Portainer: Environment do serviço/stack (não só do build). Após alterar: Recreate / redeploy
#   do container para o Node receber o process.env — não use no docker build.
# RESEND_API_KEY, DOSSIER_EMAIL_FROM — envio de email (dossiê, etc.)
#
# Volume nomeado: persiste cache em disco do Next (.next/cache) entre recriações do container
# (ISR, fetch cache, etc.). Gerido pela stack no Portainer.



services:
  nutricao_app:
    image: ${NUTRICAO_IMAGE:-stratostech/nutricao-stratostech:latest}
    platform: ${NUTRICAO_PLATFORM:-linux/amd64}
    container_name: nutricao_stratostech
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # ── Vars de build (NEXT_PUBLIC_*) ────────────────────────────────────
      # Recomendado redefinir aqui também: permite rodar a mesma imagem com outro projeto
      # sem rebuild. Se deixar vazio o Docker passa a var em branco; preencha no Portainer.
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
      # ── Vars obrigatórias em runtime (servidor apenas) ───────────────────
      # SUPABASE_SERVICE_ROLE_KEY: Supabase Dashboard → Project Settings → API → service_role
      # Defina no Portainer: Service → Environment → "SUPABASE_SERVICE_ROLE_KEY" + valor.
      # Após adicionar ou alterar: Recreate (não só Update/Save) para o Node receber o valor.
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      # ── Vars opcionais (email) ────────────────────────────────────────────
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      DOSSIER_EMAIL_FROM: ${DOSSIER_EMAIL_FROM:-}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    volumes:
      - nutricao_next_cache:/app/.next/cache
    labels:
      - traefik.enable=true
      - "traefik.http.routers.nutricao_app.rule=Host(`nutricao.stratostech.com.br`)"
      - traefik.http.routers.nutricao_app.entrypoints=websecure
      - traefik.http.routers.nutricao_app.tls.certresolver=letsencryptresolver
      - traefik.http.routers.nutricao_app.priority=1
      - traefik.http.routers.nutricao_app.service=nutricao_app
      - traefik.http.middlewares.nutricao_sslheader.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.routers.nutricao_app.middlewares=nutricao_sslheader
      - traefik.http.services.nutricao_app.loadbalancer.server.port=3000
      - traefik.http.services.nutricao_app.loadbalancer.passHostHeader=true
      - traefik.docker.network=HMLStratosNetwork
    networks:
      - HMLStratosNetwork

volumes:
  nutricao_next_cache:
    driver: local

networks:
  HMLStratosNetwork:
    external: true
    name: HMLStratosNetwork
