# Stack Portainer + Traefik — NutriGestao_stratosTech
#
# ANTES DO DEPLOY:
# 1) Build e push da imagem (NEXT_PUBLIC_* como --build-arg):
#    docker buildx build --platform linux/amd64 --push \
#      --build-arg NEXT_PUBLIC_SUPABASE_URL=https://xxx.supabase.co \
#      --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJ... \
#      --build-arg NEXT_PUBLIC_SITE_URL=https://nutricao.stratostech.com.br \
#      -t seuusuario/nutricao-stratostech:latest .
#
# 2) No Portainer, aba "Environment variables" da STACK, definir:
#    NUTRICAO_IMAGE            = seuusuario/nutricao-stratostech:latest
#    SUPABASE_SERVICE_ROLE_KEY = eyJ... (Supabase > Project Settings > API > service_role)
#    RESEND_API_KEY            = re_... (opcional)
#    DOSSIER_EMAIL_FROM        = noreply@... (opcional)
#
# 3) Apos definir as variaveis: Recreate o container (nao so Update/Save).

services:
  nutricao_app:
    image: ${NUTRICAO_IMAGE:-stratostech/nutricao-stratostech:latest}
    platform: ${NUTRICAO_PLATFORM:-linux/amd64}
    container_name: nutricao_stratostech
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY:-}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      DOSSIER_EMAIL_FROM: "${DOSSIER_EMAIL_FROM:-}"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    volumes:
      - nutricao_next_cache:/app/.next/cache
    labels:
      - traefik.enable=true
      - "traefik.http.routers.nutricao_app.rule=Host(`nutricao.stratostech.com.br`)"
      - traefik.http.routers.nutricao_app.entrypoints=websecure
      - traefik.http.routers.nutricao_app.tls.certresolver=letsencryptresolver
      - traefik.http.routers.nutricao_app.priority=1
      - traefik.http.routers.nutricao_app.service=nutricao_app
      - traefik.http.middlewares.nutricao_sslheader.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.routers.nutricao_app.middlewares=nutricao_sslheader
      - traefik.http.services.nutricao_app.loadbalancer.server.port=3000
      - traefik.http.services.nutricao_app.loadbalancer.passHostHeader=true
      - traefik.docker.network=HMLStratosNetwork
    networks:
      - HMLStratosNetwork

volumes:
  nutricao_next_cache:
    driver: local

networks:
  HMLStratosNetwork:
    external: true
    name: HMLStratosNetwork
