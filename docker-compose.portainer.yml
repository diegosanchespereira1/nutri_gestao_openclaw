# NutriGestão — Portainer + Traefik
#
# NOTAS IMPORTANTES
# ─────────────────
# 1) Rede externa: cria antes (ou o deploy falha):
#    docker network create HMLStratosNetwork
#
# 2) Não uses volume em /app/.next/cache com USER nextjs na imagem: o volume fica
#    root-owned e o Next não consegue escrever → erro 500 em runtime.
#
# 3) Em Docker Swarm (stack), não uses `container_name` (não suportado).
#
# 4) Build da imagem com NEXT_PUBLIC_* em --build-arg; no Portainer define também
#    SUPABASE_SERVICE_ROLE_KEY na stack e Recreate após alterar.
#
# 4b) Server Actions / deploy: defina NEXT_SERVER_ACTIONS_ENCRYPTION_KEY no build
#     (ex.: openssl rand -base64 32) e a mesma chave em todos os replicas. Upload de
#     fotos de checklist usa POST /api/checklists/fill-session-photo para evitar o
#     erro "Server Action was not found" com cache ou versões mistas.
#
# 5) Para múltiplas stacks no mesmo Portainer/Traefik, define variáveis diferentes:
#    - APP_HOST (ex: dev.nutricao.stratostech.com.br)
#    - TRAEFIK_ROUTER_NAME / TRAEFIK_SERVICE_NAME / TRAEFIK_MIDDLEWARE_NAME
#    Evita conflito de labels entre stacks.

services:
  nutricao_app:
    image: ${NUTRICAO_IMAGE:-stratostech/nutricao-stratostech:latest}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      DOSSIER_EMAIL_FROM: ${DOSSIER_EMAIL_FROM:-}
    # Rota estática com 200 (evita 307 de /)
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(\"http://127.0.0.1:3000/login\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 90s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      update_config:
        parallelism: 1
        order: start-first
        delay: 10s
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-nutricao-app}.rule=Host(`${APP_HOST:-nutricao.stratostech.com.br}`)"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-nutricao-app}.entrypoints=websecure"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-nutricao-app}.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-nutricao-app}.priority=1"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-nutricao-app}.service=${TRAEFIK_SERVICE_NAME:-nutricao-app}"
      - "traefik.http.middlewares.${TRAEFIK_MIDDLEWARE_NAME:-nutricao-sslheader}.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-nutricao-app}.middlewares=${TRAEFIK_MIDDLEWARE_NAME:-nutricao-sslheader}"
      - "traefik.http.services.${TRAEFIK_SERVICE_NAME:-nutricao-app}.loadbalancer.server.port=3000"
      - "traefik.http.services.${TRAEFIK_SERVICE_NAME:-nutricao-app}.loadbalancer.passHostHeader=true"
      - traefik.docker.network=HMLStratosNetwork
    networks:
      - HMLStratosNetwork

networks:
  HMLStratosNetwork:
    external: true
    name: HMLStratosNetwork
